services:
  backend:
    build:
      context: ./backend
    container_name: playwright-visible-backend
    environment:
      APP_NAME: browser-automation-platform
      APP_ENV: development
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      LOG_LEVEL: INFO
      DISPLAY: :99
      CORS_ORIGINS: http://localhost:5173
      PLAYWRIGHT_HEADLESS: "false"
      PLAYWRIGHT_TIMEOUT_MS: 30000
      PLAYWRIGHT_KEEP_OPEN_MS: 15000
      VNC_PORT: 5900
      NOVNC_PORT: 6080
    ports:
      - "8000:8000"
      - "6080:6080"
      - "5900:5900"
    volumes:
      - ./backend/src:/app/src
      - ./backend/start.sh:/app/start.sh
    shm_size: 2gb
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
    container_name: playwright-visible-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
      VITE_NOVNC_URL: http://localhost:6080/vnc.html?autoconnect=true&resize=remote
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
